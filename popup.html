<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>BIS Checker</title>
  <link rel="stylesheet" href="popup.css">
</head>

<body>
  <h2>AMP BIS CHECKER</h2>
  <div id="errorMsg" class="error-msg hidden"></div>

  <!-- Section 1: Page Check -->
  <div class="section">
    <div class="tooltip-wrapper"
      data-tooltip="Scans the page for the BIS widget script, #BIS_trigger (ID), and .BIS_trigger (Class). Detects if elements are hidden by CSS.">
      <button id="checkBtn" class="primary-btn last-btn">Check Scripts & Elements</button>
    </div>

    <div id="results">
      <div class="result-block">
        <div class="status-item">
          <span>BIS Script:</span>
          <button id="scriptStatus" class="status-btn unknown" disabled>Unknown</button>
        </div>
        <div id="scriptDetails" class="details hidden"></div>
      </div>

      <div class="result-block">
        <div class="status-item">
          <span>#BIS_trigger (ID):</span>
          <button id="idStatus" class="status-btn unknown" disabled>Unknown</button>
        </div>
        <div id="idDetails" class="details hidden"></div>
      </div>

      <div class="result-block">
        <div class="status-item">
          <span>.BIS_trigger (Class):</span>
          <button id="classStatus" class="status-btn unknown" disabled>Unknown</button>
        </div>
        <div id="classDetails" class="details hidden"></div>
      </div>
    </div>
  </div>

  <!-- Section 2: BIS Check -->
  <div class="section">
    <div class="tooltip-wrapper"
      data-tooltip="Checks each variant's Stock, Inventory Tracking, Continue Selling, and tag exclusions to determine if the BIS button should show. Must be on a product page.">
      <button id="checkBisProductBtn" class="primary-btn last-btn">Check BIS Product</button>
    </div>

    <div id="bisResults" class="hidden">
      <!-- BIS results will be injected here -->
    </div>
  </div>

  <!-- Section 2.5: Custom JS Check -->
  <div class="section">
    <div class="tooltip-wrapper"
      data-tooltip="Fetches the current Custom JS inserted by the merchant in the BIS Admin. Must be run on a Shopify storefront.">
      <button id="checkCustomJsBtn" class="primary-btn last-btn">Check Custom JS</button>
    </div>

    <div id="customJsResults" class="hidden">
      <!-- Custom JS results will be injected here -->
    </div>
  </div>

  <!-- Section 3: Editor -->
  <div class="section">
    <div class="tooltip-wrapper"
      data-tooltip="Injects the BIS Admin Copy Widget into the page so you can configure and generate integration scripts without backend access.">
      <button id="openEditorBtn" class="primary-btn last-btn">Open BIS Editor</button>
    </div>
  </div>

  <!-- Section 3: Injector -->
  <div class="section">
    <div class="tooltip-wrapper"
      data-tooltip="Paste a BIS widget URL and inject it into the page. Useful for testing widgets on unlinked or custom themes.">
      <div class="inject-section">
        <input type="text" id="injectScriptUrl" placeholder="Paste BIS Admin Copy Widget URL here..." />
        <button id="injectScriptBtn" class="primary-btn last-btn">Inject Script</button>
      </div>
    </div>
  </div>

  <!-- Section 4: Snippets -->
  <div class="section">
    <div class="tooltip-wrapper"
      data-tooltip="Copies the standard V1 Collection Liquid snippet to your clipboard for pasting into collection templates.">
      <button id="copyCollectionsBtn" class="primary-btn last-btn">Copy V1 Collection Snippet</button>
    </div>
  </div>

  <br />
  <hr style="border: 0; border-top: 1px solid #ebebeb; margin: 15px 0;">
  <h2>AMP PREORDER CHECKER</h2>
  <div id="errorMsgPreorder" class="error-msg hidden"></div>

  <!-- Section 5: Preorder Check -->
  <div class="section">
    <div class="tooltip-wrapper"
      data-tooltip="Checks each variant's Stock and Continue Selling policy to determine if the Preorder button should show. Detects App Embed status and visibility settings. Must be on a product page.">
      <button id="checkPreorderBtn" class="primary-btn last-btn">Check Preorder Product</button>
    </div>

    <div id="preorderResults" class="hidden">
      <!-- Preorder results will be injected here -->
    </div>
  </div>

  <script src="popup.js"></script>
</body>

</html>
